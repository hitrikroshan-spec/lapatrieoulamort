<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Faso Réalisations</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6c5ce7; --bg: #f8f9fd; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 260px; background: var(--white); height: 100vh; position: fixed; padding: 30px 20px; border-right: 1px solid #ddd; }
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 40px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card div { font-size: 1.5rem; font-weight: 700; color: var(--primary); }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 500px; max-height: 90vh; overflow-y: auto; }
        
        input, select { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; color: black !important; font-family: inherit; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--primary)">Faso Admin</h2>
    <p style="font-size:0.8rem; margin-bottom:30px">Base de données Firebase</p>
    <button class="btn" onclick="openModal()">+ Nouveau Projet</button>
    <br><br>
    <a href="index.html" style="text-decoration:none; color:#666; font-size:0.9rem">🏠 Retour au Site</a>
</div>

<div class="main-content">
    <div class="stats-grid">
        <div class="stat-card"><small>Total Projets</small><div id="statTotal">0</div></div>
        <div class="stat-card"><small>Budget Global</small><div id="statBudget">0</div></div>
        <div class="stat-card"><small>Lien Firebase</small><div style="font-size:0.7rem; overflow:hidden">Connecté</div></div>
    </div>

    <table>
        <thead><tr><th>Titre</th><th>Région</th><th>Avancement</th><th>Action</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="modalForm" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Ajouter un Projet</h3>
        <form id="projForm">
            <input type="hidden" id="editId">
            <label>Titre</label><input type="text" id="titre" required>
            <label>Année</label><input type="number" id="annee" value="2026" required>
            <label>Région</label>
            <select id="region">
                <option>Bankui</option><option>Djôrô</option><option>Goulmou</option><option>Guiriko</option>
                <option>Kadiogo</option><option>Kuilsé</option><option>Liptako</option><option>Nando</option>
                <option>Nakambé</option><option>Nazinon</option><option>Oubri</option><option>Sirba</option>
                <option>Soum</option><option>Sourou</option><option>Tannounyan</option><option>Tapoa</option>
                <option>Yaadga</option>
            </select>
            <label>Ministère</label><input type="text" id="ministere" placeholder="ex: Santé" required>
            <label>Budget (FCFA)</label><input type="number" id="budget" required>
            <label>Avancement (%)</label><input type="number" id="avancement" min="0" max="100" required>
            <label>Image Maquette</label><input type="file" id="img1">
            <label>Image Réalité</label><input type="file" id="img2">
            <div style="display:flex; gap:10px">
                <button type="submit" class="btn">Enregistrer</button>
                <button type="button" class="btn" style="background:#ccc" onclick="closeModal()">Annuler</button>
            </div>
        </form>
    </div>
</div>

<script>
    const DB_BASE = "https://lapatrieoulamort-20210-default-rtdb.firebaseio.com/projets";
    const DB_URL = DB_BASE + ".json";
    let projectsData = {};

    async function fetchData() {
        const res = await fetch(DB_URL);
        projectsData = await res.json() || {};
        const list = Object.keys(projectsData).map(k => ({id: k, ...projectsData[k]}));
        
        document.getElementById('statTotal').innerText = list.length;
        const total = list.reduce((s, p) => s + Number(p.budget), 0);
        document.getElementById('statBudget').innerText = total.toLocaleString() + " FCFA";

        document.getElementById('tableBody').innerHTML = list.map(p => `
            <tr>
                <td><b>${p.titre}</b></td>
                <td>${p.region}</td>
                <td>${p.avancement}%</td>
                <td>
                    <button onclick="editP('${p.id}')" style="border:none; cursor:pointer; margin-right:10px">✏️</button>
                    <button onclick="deleteP('${p.id}')" style="border:none; cursor:pointer">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    function openModal() {
        document.getElementById('projForm').reset();
        document.getElementById('editId').value = "";
        document.getElementById('modalTitle').innerText = "Ajouter un Projet";
        document.getElementById('img1').required = true;
        document.getElementById('img2').required = true;
        document.getElementById('modalForm').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalForm').style.display = 'none';
    }

    function editP(id) {
        const p = projectsData[id];
        document.getElementById('editId').value = id;
        document.getElementById('titre').value = p.titre;
        document.getElementById('annee').value = p.annee;
        document.getElementById('region').value = p.region;
        document.getElementById('ministere').value = p.ministere;
        document.getElementById('budget').value = p.budget;
        document.getElementById('avancement').value = p.avancement;
        
        // En édition, les images ne sont plus obligatoires (on garde les anciennes si vides)
        document.getElementById('img1').required = false;
        document.getElementById('img2').required = false;
        
        document.getElementById('modalTitle').innerText = "Modifier le Projet";
        document.getElementById('modalForm').style.display = 'flex';
    }

    async function deleteP(id) {
        if(confirm("Supprimer ?")) {
            await fetch(`${DB_BASE}/${id}.json`, { method: 'DELETE' });
            fetchData();
        }
    }

    document.getElementById('projForm').onsubmit = async function(e) {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const getB64 = (f) => new Promise(r => { 
            if(!f) return r(null);
            let rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result); 
        });
        
        const img1File = document.getElementById('img1').files[0];
        const img2File = document.getElementById('img2').files[0];

        const proj = {
            titre: document.getElementById('titre').value,
            annee: document.getElementById('annee').value,
            region: document.getElementById('region').value,
            ministere: document.getElementById('ministere').value,
            budget: document.getElementById('budget').value,
            avancement: document.getElementById('avancement').value
        };

        // Gestion des images (si nouvelles images, on convertit, sinon on garde les anciennes en mode Edit)
        const b64_1 = await getB64(img1File);
        const b64_2 = await getB64(img2File);

        if(id) {
            // Mode Modification
            proj.imgFinal = b64_1 || projectsData[id].imgFinal;
            proj.imgCours = b64_2 || projectsData[id].imgCours;
            await fetch(`${DB_BASE}/${id}.json`, { method: 'PUT', body: JSON.stringify(proj) });
        } else {
            // Mode Ajout
            proj.imgFinal = b64_1;
            proj.imgCours = b64_2;
            await fetch(DB_URL, { method: 'POST', body: JSON.stringify(proj) });
        }

        closeModal();
        fetchData();
    };

    window.onload = fetchData;
</script>
</body>
</html>
